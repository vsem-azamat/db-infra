metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "lmdb"
metadata_auto_snapshot_interval = "6h"

# Single-node evaluation deployment. Real production redundancy requires at
# least three Garage nodes/zones and replication_factor = 3.
replication_factor = 1
consistency_mode = "consistent"
compression_level = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "garage:3901"

[s3_api]
api_bind_addr = "[::]:3900"
s3_region = "garage"
root_domain = ".garage.azamat.io"

[admin]
api_bind_addr = "[::]:3903"
metrics_require_token = true
