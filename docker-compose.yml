name: db-infra

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: infra-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - infra-postgres-data:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT}:5432"
    
  databasus:
    image: databasus/databasus:v3.42.0
    container_name: infra-databasus
    restart: unless-stopped
    volumes:
      - infra-databasus-data:/databasus-data
    ports:
      - "127.0.0.1:${DATABASUS_PORT:-4005}:4005"

  redis:
    image: redis:8.4.0
    container_name: infra-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--bind", "0.0.0.0", "--protected-mode", "no", "--aclfile", "/etc/redis/users.acl"]
    volumes:
      - infra-redis-data:/data
      - ./redis-users.acl:/etc/redis/users.acl
    ports:
      - "${REDIS_PORT}:6379"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: infra-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - infra-minio-data:/data
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"

  garage:
    image: dxflrs/garage:v2.3.0
    container_name: infra-garage
    restart: unless-stopped
    environment:
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
      GARAGE_METRICS_TOKEN: ${GARAGE_METRICS_TOKEN}
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - infra-garage-meta:/var/lib/garage/meta
      - infra-garage-data:/var/lib/garage/data
    ports:
      - "127.0.0.1:${GARAGE_S3_PORT}:3900"
      - "127.0.0.1:${GARAGE_ADMIN_PORT}:3903"

  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: infra-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.external-url=https://prometheus.azamat.io/"
      - "--web.route-prefix=/"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/secrets:/etc/prometheus/secrets:ro
      - infra-prometheus-data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:12.4.4
    container_name: infra-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://grafana.azamat.io/
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - infra-grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"

volumes:
  infra-postgres-data:
  infra-databasus-data:
  infra-redis-data:
  infra-minio-data:
  infra-garage-meta:
  infra-garage-data:
  infra-prometheus-data:
  infra-grafana-data:
